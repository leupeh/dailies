<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Checklist</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%234f46e5'/><path d='M18 32 L28 42 L46 22' stroke='white' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f9fafb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            margin: 0;
        }
        .container {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; }
        
        .settings {
            background: #f3f4f6;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .settings label { font-size: 0.9rem; font-weight: 600; color: var(--muted); }
        .settings input[type="time"] {
            padding: 0.4rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
        }

        .input-group { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .input-group input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus { 
            border-color: var(--primary); 
            outline: 2px solid var(--primary); 
            outline-offset: -1px; 
        }
        .btn {
            padding: 0.75rem 1.25rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger); font-size: 0.8rem; padding: 0.4rem 0.8rem; }

        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
            gap: 0.75rem;
        }
        li:last-child { border-bottom: none; }
        li input[type="checkbox"] { width: 1.2rem; height: 1.2rem; cursor: pointer; }
        li span { flex: 1; font-size: 1rem; }
        li.completed span {
            text-decoration: line-through;
            color: var(--muted);
        }
        .empty-state {
            text-align: center;
            color: var(--muted);
            padding: 2rem 0;
            font-style: italic;
        }
        .debug-btn {
            margin-top: 2rem;
            width: 100%;
            background: #e5e7eb;
            color: var(--text);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✅ Daily Checklist</h1>
    
    <div class="settings">
        <label for="uncheckTime">Daily Uncheck Time:</label>
        <input type="time" id="uncheckTime" value="00:00">
    </div>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="100">
        <button class="btn" onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
    <div id="emptyState" class="empty-state" style="display: none;">No tasks yet. Add one above!</div>

    <button class="btn debug-btn" onclick="forceUncheck()">🛠️ Force Uncheck All (For Testing)</button>
</div>

<script>
    const TASKS_KEY = 'dailyChecklist_tasks';
    const UNCHECK_TIME_KEY = 'dailyChecklist_uncheckTime';
    const NEXT_UNCHECK_TIMESTAMP_KEY = 'dailyChecklist_nextUncheckTimestamp';

    let uncheckTimeoutId = null;

    // Initialize app
    document.addEventListener('DOMContentLoaded', () => {
        const savedTime = localStorage.getItem(UNCHECK_TIME_KEY) || '00:00';
        document.getElementById('uncheckTime').value = savedTime;
        
        // ALWAYS check and uncheck on page load to catch missed resets
        checkAndUncheck();
        
        // THEN schedule the next timer for live updates if tab stays open
        initializeUncheckSchedule();
        
        renderTasks();
    });

    // If user changes the time, recalculate and re-check immediately
    document.getElementById('uncheckTime').addEventListener('change', (e) => {
        localStorage.setItem(UNCHECK_TIME_KEY, e.target.value);
        checkAndUncheck();
        initializeUncheckSchedule();
    });

    document.getElementById('taskInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTask();
    });

    // --- CORE UNCHECK LOGIC (NEVER DELETES TASKS) ---

    function initializeUncheckSchedule() {
        const timeStr = localStorage.getItem(UNCHECK_TIME_KEY) || '00:00';
        const nextTimestamp = calculateNextUncheckTimestamp(timeStr);
        localStorage.setItem(NEXT_UNCHECK_TIMESTAMP_KEY, nextTimestamp);
        scheduleUncheck();
    }

    function calculateNextUncheckTimestamp(timeStr) {
        const [h, m] = timeStr.split(':').map(Number);
        const now = new Date();
        
        let nextUncheck = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
        
        if (now >= nextUncheck) {
            nextUncheck.setDate(nextUncheck.getDate() + 1);
        }
        
        return nextUncheck.getTime();
    }

    function scheduleUncheck() {
        if (uncheckTimeoutId) clearTimeout(uncheckTimeoutId);
        
        const nextTimestamp = parseInt(localStorage.getItem(NEXT_UNCHECK_TIMESTAMP_KEY));
        const delay = nextTimestamp - Date.now();
        
        if (delay > 0) {
            uncheckTimeoutId = setTimeout(() => {
                performUncheck();
            }, delay);
        }
    }

    // GUARANTEED TO RUN ON EVERY PAGE REFRESH / REOPEN
    function checkAndUncheck() {
        const nextTimestamp = parseInt(localStorage.getItem(NEXT_UNCHECK_TIMESTAMP_KEY) || '0');
        // If current time is past the scheduled uncheck time, force the uncheck NOW
        if (Date.now() >= nextTimestamp) {
            performUncheck();
        }
    }

    // ONLY UNCHECKS TASKS. NEVER DELETES OR RESETS THE LIST.
    function performUncheck() {
        const tasks = getTasks();
        // Explicitly only toggle completed status to false. Task text and IDs remain untouched.
        tasks.forEach(t => t.completed = false);
        saveTasks(tasks);
        
        // Immediately calculate and save the NEXT uncheck time
        const timeStr = localStorage.getItem(UNCHECK_TIME_KEY) || '00:00';
        const nextTimestamp = calculateNextUncheckTimestamp(timeStr);
        localStorage.setItem(NEXT_UNCHECK_TIMESTAMP_KEY, nextTimestamp);
        
        // Reschedule the timer for the next day
        scheduleUncheck();
        renderTasks();
        
        console.log("All tasks unchecked! Next uncheck scheduled for:", new Date(nextTimestamp).toLocaleString());
    }

    // --- TASK MANAGEMENT ---

    function getTasks() {
        return JSON.parse(localStorage.getItem(TASKS_KEY) || '[]');
    }

    function saveTasks(tasks) {
        localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
    }

    function addTask() {
        const input = document.getElementById('taskInput');
        const text = input.value.trim();
        if (!text) return;

        const tasks = getTasks();
        tasks.push({ id: Date.now(), text: text, completed: false });
        saveTasks(tasks);
        
        input.value = '';
        renderTasks();
    }

    function toggleTask(id) {
        const tasks = getTasks();
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.completed = !task.completed;
            saveTasks(tasks);
            renderTasks();
        }
    }

    function deleteTask(id) {
        let tasks = getTasks();
        tasks = tasks.filter(t => t.id !== id);
        saveTasks(tasks);
        renderTasks();
    }

    function renderTasks() {
        const tasks = getTasks();
        const list = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');
        
        list.innerHTML = '';
        
        if (tasks.length === 0) {
            emptyState.style.display = 'block';
            return;
        }
        emptyState.style.display = 'none';

        tasks.forEach(task => {
            const li = document.createElement('li');
            li.className = task.completed ? 'completed' : '';
            
            li.innerHTML = `
                <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
                <span>${escapeHtml(task.text)}</span>
                <button class="btn btn-danger" onclick="deleteTask(${task.id})">Delete</button>
            `;
            list.appendChild(li);
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Testing utility: ONLY unchecks, never deletes
    function forceUncheck() {
        performUncheck();
        alert("All tasks have been unchecked! (Simulated daily uncheck)");
    }
</script>

</body>
</html>
