<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Checklist</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f9fafb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            margin: 0;
        }
        .container {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; }
        
        .settings {
            background: #f3f4f6;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .settings label { font-size: 0.9rem; font-weight: 600; color: var(--muted); }
        .settings input[type="time"] {
            padding: 0.4rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
        }

        .input-group { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .input-group input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus { 
            border-color: var(--primary); 
            outline: 2px solid var(--primary); 
            outline-offset: -1px; 
        }
        .btn {
            padding: 0.75rem 1.25rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger); font-size: 0.8rem; padding: 0.4rem 0.8rem; }

        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
            gap: 0.75rem;
        }
        li:last-child { border-bottom: none; }
        li input[type="checkbox"] { width: 1.2rem; height: 1.2rem; cursor: pointer; }
        li span { flex: 1; font-size: 1rem; }
        li.completed span {
            text-decoration: line-through;
            color: var(--muted);
        }
        .empty-state {
            text-align: center;
            color: var(--muted);
            padding: 2rem 0;
            font-style: italic;
        }
        .debug-btn {
            margin-top: 2rem;
            width: 100%;
            background: #e5e7eb;
            color: var(--text);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✅ Daily Checklist</h1>
    
    <div class="settings">
        <label for="resetTime">Daily Reset Time:</label>
        <input type="time" id="resetTime" value="00:00">
    </div>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="100">
        <button class="btn" onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
    <div id="emptyState" class="empty-state" style="display: none;">No tasks for today. Add one above!</div>

    <!-- Hidden debug button to test the reset logic without waiting 24 hours -->
    <button class="btn debug-btn" onclick="forceReset()">🛠️ Force Reset (For Testing)</button>
</div>

<script>
    const TASKS_KEY = 'dailyChecklist_tasks';
    const RESET_TIME_KEY = 'dailyChecklist_resetTime';
    const LAST_RESET_KEY = 'dailyChecklist_lastReset';

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        const savedTime = localStorage.getItem(RESET_TIME_KEY) || '00:00';
        document.getElementById('resetTime').value = savedTime;
        
        checkAndReset();
        renderTasks();
    });

    // Save reset time when changed
    document.getElementById('resetTime').addEventListener('change', (e) => {
        localStorage.setItem(RESET_TIME_KEY, e.target.value);
        checkAndReset(); // Re-evaluate in case the new time triggers a reset
    });

    // Allow "Enter" key to add task
    document.getElementById('taskInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTask();
    });

    function getTasks() {
        return JSON.parse(localStorage.getItem(TASKS_KEY) || '[]');
    }

    function saveTasks(tasks) {
        localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
    }

    function checkAndReset() {
        const resetTime = localStorage.getItem(RESET_TIME_KEY) || '00:00';
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0]; // "YYYY-MM-DD"
        const lastResetStr = localStorage.getItem(LAST_RESET_KEY) || '';

        // Create a Date object for today's configured reset time
        const [hours, minutes] = resetTime.split(':');
        const todayResetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0, 0);

        // If today's date is strictly after the last reset date, AND current time is past today's reset time
        if (todayStr > lastResetStr && now >= todayResetDate) {
            saveTasks([]); // Clear tasks
            localStorage.setItem(LAST_RESET_KEY, todayStr);
            console.log("Checklist reset for the new day!");
        }
    }

    function addTask() {
        const input = document.getElementById('taskInput');
        const text = input.value.trim();
        if (!text) return;

        const tasks = getTasks();
        tasks.push({ id: Date.now(), text: text, completed: false });
        saveTasks(tasks);
        
        input.value = '';
        renderTasks();
    }

    function toggleTask(id) {
        const tasks = getTasks();
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.completed = !task.completed;
            saveTasks(tasks);
            renderTasks();
        }
    }

    function deleteTask(id) {
        let tasks = getTasks();
        tasks = tasks.filter(t => t.id !== id);
        saveTasks(tasks);
        renderTasks();
    }

    function renderTasks() {
        const tasks = getTasks();
        const list = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');
        
        list.innerHTML = '';
        
        if (tasks.length === 0) {
            emptyState.style.display = 'block';
            return;
        }
        emptyState.style.display = 'none';

        tasks.forEach(task => {
            const li = document.createElement('li');
            li.className = task.completed ? 'completed' : '';
            
            li.innerHTML = `
                <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
                <span>${escapeHtml(task.text)}</span>
                <button class="btn btn-danger" onclick="deleteTask(${task.id})">Delete</button>
            `;
            list.appendChild(li);
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Testing utility: Clears data and sets last reset to yesterday to simulate a new day
    function forceReset() {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        localStorage.setItem(LAST_RESET_KEY, yesterday.toISOString().split('T')[0]);
        checkAndReset();
        renderTasks();
        alert("Checklist forced to reset! (Simulated yesterday's date)");
    }
</script>

</body>
</html>
